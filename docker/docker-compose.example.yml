services:
  indextts-cuda:
    image: ghcr.io/seancheung/indextts-openai-tts-api:cuda-latest
    ports:
      - "8000:8000"
    volumes:
      # NOTE: /checkpoints must be writable — IndexTTS2 downloads a few auxiliary
      # models (MaskGCT, CAM++, BigVGAN) into checkpoints/hf_cache on first run.
      - ./checkpoints:/checkpoints
      - ./voices:/voices:ro
      - ./hf_cache:/root/.cache/huggingface
    environment:
      INDEXTTS_MODEL_DIR: "/checkpoints"
      INDEXTTS_DEVICE: "cuda"
      INDEXTTS_USE_FP16: "true"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  indextts-cpu:
    image: ghcr.io/seancheung/indextts-openai-tts-api:latest
    ports:
      - "8010:8000"
    volumes:
      - ./checkpoints:/checkpoints
      - ./voices:/voices:ro
      - ./hf_cache:/root/.cache/huggingface
    environment:
      INDEXTTS_MODEL_DIR: "/checkpoints"
      INDEXTTS_DEVICE: "cpu"
